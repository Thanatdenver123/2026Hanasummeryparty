<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Summer Party 2026 - Smart Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .image-card:hover { transform: scale(1.03); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .video-indicator { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        .nav-btn { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px); transition: 0.2s; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="text-slate-800">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass shadow-sm px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                <div class="bg-blue-600 p-2.5 rounded-2xl text-white shadow-lg shadow-blue-200">
                    <i data-lucide="sun"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-none text-slate-900 uppercase">Hana Summer Party 2026</h1>
                    <span class="text-[10px] text-blue-600 font-bold uppercase tracking-[0.2em]">Smart Media Discovery</span>
                </div>
            </div>

            <div id="searchActions" class="flex items-center gap-3 w-full md:w-auto">
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleVisualSearch(event)">
                <button onclick="document.getElementById('imageInput').click()" 
                        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full shadow-lg shadow-blue-100 transition-all w-full justify-center active:scale-95">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    <span>ค้นหาด้วยรูปภาพ</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <!-- API 403 Error Setup Guide -->
        <div id="setupGuide" class="hidden mb-10 p-8 bg-white border-2 border-red-100 rounded-[2.5rem] animate-in shadow-2xl shadow-red-200/20">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="bg-red-500 text-white p-6 rounded-3xl shadow-xl shadow-red-200">
                    <i data-lucide="shield-alert" class="w-12 h-12"></i>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <h2 class="text-3xl font-bold text-gray-900 mb-2 tracking-tight">การเข้าถึง API ถูกจำกัด</h2>
                    <p class="text-gray-600 mb-6 leading-relaxed">โปรดอนุญาตโดเมนใน Google Cloud Console:</p>
                    <div class="bg-slate-900 p-5 rounded-3xl flex flex-col md:flex-row items-center gap-4">
                        <code id="wildcardValue" class="text-blue-400 font-mono text-sm break-all flex-1">*.usercontent.goog/*</code>
                        <button onclick="copyToClipboard('wildcardValue')" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold">คัดลอก</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Visual Search Preview -->
        <div id="searchPreview" class="hidden mb-10 p-8 bg-white border border-blue-100 rounded-[3rem] shadow-xl animate-in text-center">
            <h3 class="text-blue-600 font-bold mb-6 flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                <i data-lucide="cpu" class="w-4 h-4"></i>
                <span>AI ค้นหาสื่อที่ใกล้เคียงที่สุด</span>
            </h3>
            <div class="relative inline-block group">
                <img id="targetPreviewImg" class="h-48 w-48 object-cover rounded-3xl shadow-2xl border-4 border-white" src="" alt="Target">
                <button onclick="resetSearch()" class="absolute -top-3 -right-3 bg-red-500 text-white p-2 rounded-full hover:bg-red-600 shadow-lg active:scale-90 transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="mt-6 flex flex-col items-center gap-2">
                <div id="searchSpinner" class="loader ease-linear rounded-full border-3 border-t-3 border-gray-200 h-6 w-6"></div>
                <p id="searchStatus" class="text-xs text-blue-500 font-medium uppercase">กำลังวิเคราะห์ลักษณะสื่อ...</p>
            </div>
        </div>

        <!-- Main Loader -->
        <div id="mainLoader" class="flex flex-col items-center justify-center py-32">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-6"></div>
            <p class="text-slate-400 text-lg">กำลังโหลดคลังสื่อ...</p>
        </div>

        <!-- Gallery Container -->
        <div id="galleryContainer" class="space-y-12 pb-20"></div>

    </main>

    <!-- Modal for Media View -->
    <div id="imageModal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[100] hidden items-center justify-center p-4 select-none">
        <!-- Close Button (Optimized for Mobile) -->
        <button onclick="closeModal()" class="absolute top-4 right-4 md:top-8 md:right-8 bg-white/20 hover:bg-white/40 text-white p-4 rounded-full z-[110] transition-all active:scale-90 shadow-lg">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>

        <!-- Navigation Arrows -->
        <button id="prevBtn" onclick="navigateMedia(-1)" class="nav-btn absolute left-2 md:left-8 top-1/2 -translate-y-1/2 text-white p-4 rounded-full z-[105] hidden md:block">
            <i data-lucide="chevron-left" class="w-10 h-10"></i>
        </button>
        <button id="nextBtn" onclick="navigateMedia(1)" class="nav-btn absolute right-2 md:right-8 top-1/2 -translate-y-1/2 text-white p-4 rounded-full z-[105] hidden md:block">
            <i data-lucide="chevron-right" class="w-10 h-10"></i>
        </button>

        <!-- Content Area -->
        <div class="max-w-5xl w-full flex flex-col items-center gap-6 animate-in relative">
            <div id="modalContent" class="w-full flex justify-center items-center min-h-[50vh]">
                <!-- Image or Video will be injected here -->
            </div>
            
            <!-- Floating Mobile Navigation -->
            <div class="flex md:hidden gap-8 mb-4">
                 <button onclick="navigateMedia(-1)" class="bg-white/10 p-4 rounded-full text-white active:bg-white/30">
                    <i data-lucide="chevron-left" class="w-8 h-8"></i>
                </button>
                 <button onclick="navigateMedia(1)" class="bg-white/10 p-4 rounded-full text-white active:bg-white/30">
                    <i data-lucide="chevron-right" class="w-8 h-8"></i>
                </button>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-wrap justify-center gap-4">
                <a id="downloadBtn" href="#" download class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full flex items-center gap-2 transition-all shadow-xl font-bold">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    <span>ดาวน์โหลดรูปนี้</span>
                </a>
                <a id="driveBtn" href="#" target="_blank" class="bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-full flex items-center gap-2 transition-all border border-white/10">
                    <i data-lucide="external-link" class="w-5 h-5"></i>
                    <span>ดูบน Google Drive</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBnIUmU5oRM75p8OETC9fINXWJ3_TeFVFc';
        const ROOT_FOLDER = '1Et52WiWBv7xVkWu7fWwb6P6BMjxFk-B4';
        
        let net = null; 
        let allMedia = []; 
        let currentDisplayList = []; // List being shown currently
        let currentIndex = -1;
        let mediaEmbeddings = new Map(); 

        lucide.createIcons();

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('imageModal').classList.contains('flex')) {
                if (e.key === 'ArrowLeft') navigateMedia(-1);
                if (e.key === 'ArrowRight') navigateMedia(1);
                if (e.key === 'Escape') closeModal();
            }
        });

        // 1. Core Logic: Recursive Fetching
        window.onload = async () => {
            try {
                net = await mobilenet.load();
                console.log('AI Model Loaded');
                await fetchRecursive(ROOT_FOLDER, "Root");
                if (allMedia.length === 0) {
                    document.getElementById('galleryContainer').innerHTML = `<div class="text-center py-20 text-slate-400">ไม่พบไฟล์สื่อในคลังนี้</div>`;
                }
            } catch (error) {
                console.error(error);
                if (error.message.includes("403")) {
                    document.getElementById('setupGuide').classList.remove('hidden');
                } else {
                    showMessageBox("เกิดข้อผิดพลาด: " + error.message);
                }
            } finally {
                document.getElementById('mainLoader').classList.add('hidden');
            }
        };

        async function fetchRecursive(folderId, folderName) {
            try {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,webContentLink,thumbnailLink)&pageSize=1000&key=${API_KEY}`);
                const data = await res.json();
                const items = data.files || [];

                const subFolders = items.filter(i => i.mimeType === 'application/vnd.google-apps.folder');
                const mediaFiles = items.filter(i => i.mimeType.includes('image/') || i.mimeType.includes('video/'));

                if (mediaFiles.length > 0) {
                    const mapped = mediaFiles.map(f => ({
                        id: f.id,
                        name: f.name,
                        mimeType: f.mimeType,
                        driveLink: f.webContentLink,
                        url: f.mimeType.includes('image') ? `https://lh3.googleusercontent.com/d/${f.id}=w1600` : f.webContentLink,
                        thumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s600') : `https://lh3.googleusercontent.com/d/${f.id}=w600`,
                        folderName: folderName
                    }));
                    allMedia.push(...mapped);
                    // Keep currentDisplayList in sync with folder rendering order initially
                    if (currentDisplayList.length === 0) currentDisplayList = [...allMedia];
                    else currentDisplayList.push(...mapped);
                    
                    renderFolderSection(folderName, mapped);
                }

                for (const sub of subFolders) {
                    await fetchRecursive(sub.id, `${folderName} / ${sub.name}`);
                }
            } catch (e) {
                console.warn(`Error in ${folderName}:`, e);
            }
        }

        // 2. Rendering Logic
        function renderFolderSection(title, files) {
            const container = document.getElementById('galleryContainer');
            const section = document.createElement('section');
            section.className = 'animate-in mb-12';
            
            section.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <h2 class="text-sm font-bold text-slate-500 flex items-center gap-2 uppercase tracking-widest">
                        <i data-lucide="folder-open" class="w-4 h-4"></i> ${title}
                    </h2>
                    <div class="h-px bg-slate-200 flex-1"></div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-5"></div>
            `;
            
            const grid = section.querySelector('.grid');
            files.forEach(file => {
                grid.appendChild(createMediaCard(file));
            });
            
            container.appendChild(section);
            lucide.createIcons();
        }

        function createMediaCard(file) {
            const div = document.createElement('div');
            const isVideo = file.mimeType.includes('video');
            div.className = 'image-card bg-white rounded-2xl shadow-sm overflow-hidden cursor-pointer border-4 border-white hover:shadow-2xl transition-all relative group';
            div.onclick = () => {
                // When clicking a card, find its index in the current list
                currentIndex = currentDisplayList.findIndex(m => m.id === file.id);
                openModal(file);
            };
            
            div.innerHTML = `
                <div class="aspect-square bg-slate-100 relative overflow-hidden">
                    <img src="${file.thumb}" class="w-full h-full object-cover opacity-0 transition-opacity duration-500" onload="this.style.opacity='1'" crossorigin="anonymous" loading="lazy">
                    ${isVideo ? `
                        <div class="absolute inset-0 flex items-center justify-center video-indicator opacity-80 group-hover:opacity-100 transition-opacity">
                            <i data-lucide="play" class="text-white fill-white w-10 h-10"></i>
                        </div>
                    ` : ''}
                </div>
            `;
            return div;
        }

        // 3. AI Comparison (Visual Search)
        async function handleVisualSearch(event) {
            const file = event.target.files[0];
            if (!file || !net) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const previewImg = document.getElementById('targetPreviewImg');
                previewImg.src = e.target.result;
                document.getElementById('searchPreview').classList.remove('hidden');
                document.getElementById('galleryContainer').classList.add('opacity-40');
                document.getElementById('searchSpinner').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(async () => {
                    const targetActivation = await net.infer(previewImg, true);
                    const targetVector = await targetActivation.data();

                    const results = [];
                    for (let item of allMedia) {
                        try {
                            let featureVector;
                            if (mediaEmbeddings.has(item.id)) {
                                featureVector = mediaEmbeddings.get(item.id);
                            } else {
                                featureVector = await getImageEmbedding(item.thumb);
                                mediaEmbeddings.set(item.id, featureVector);
                            }
                            results.push({ ...item, score: cosineSimilarity(targetVector, featureVector) });
                        } catch (e) { results.push({ ...item, score: 0 }); }
                    }

                    results.sort((a, b) => b.score - a.score);
                    currentDisplayList = results; // Update active navigation list
                    displaySearchResults(results);
                }, 100);
            };
            reader.readAsDataURL(file);
        }

        function displaySearchResults(results) {
            const container = document.getElementById('galleryContainer');
            container.classList.remove('opacity-40');
            container.innerHTML = `
                <div class="animate-in">
                    <div class="flex items-center gap-4 mb-8">
                        <h2 class="text-xl font-bold text-blue-600 uppercase tracking-tighter italic underline decoration-blue-200 decoration-4">🎯 ผลการค้นหา (Smart Match)</h2>
                        <div class="h-1 bg-blue-100 flex-1 rounded-full"></div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                        ${results.map((f, idx) => `
                            <div class="image-card bg-white rounded-2xl shadow-md overflow-hidden cursor-pointer relative border-4 border-white" onclick='openSearchModal(${idx})'>
                                <div class="aspect-square bg-slate-100 relative">
                                    <img src="${f.thumb}" class="w-full h-full object-cover">
                                    <div class="absolute bottom-2 right-2 bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-lg">
                                        ${Math.round(f.score * 100)}% Match
                                    </div>
                                    ${f.mimeType.includes('video') ? '<div class="absolute inset-0 flex items-center justify-center bg-black/20"><i data-lucide="play" class="text-white fill-white w-10 h-10"></i></div>' : ''}
                                </div>
                                <div class="p-3 text-[10px] text-slate-400 font-bold uppercase truncate text-center bg-slate-50">${f.folderName}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('searchSpinner').classList.add('hidden');
            document.getElementById('searchStatus').innerText = "ค้นหาเสร็จสมบูรณ์!";
        }

        function openSearchModal(index) {
            currentIndex = index;
            openModal(currentDisplayList[currentIndex]);
        }

        async function getImageEmbedding(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = url;
                img.onload = async () => {
                    const activation = await net.infer(img, true);
                    const vector = await activation.data();
                    resolve(vector);
                };
                img.onerror = reject;
            });
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, mA = 0, mB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += (vecA[i] * vecB[i]);
                mA += (vecA[i] * vecA[i]);
                mB += (vecB[i] * vecB[i]);
            }
            return dotProduct / (Math.sqrt(mA) * Math.sqrt(mB));
        }

        // 4. Modal & UI Helpers
        function openModal(file) {
            const modal = document.getElementById('imageModal');
            const content = document.getElementById('modalContent');
            const downloadBtn = document.getElementById('downloadBtn');
            const driveBtn = document.getElementById('driveBtn');
            
            content.innerHTML = '<div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>';
            
            // Render content based on type
            const renderContent = () => {
                if (file.mimeType.includes('video')) {
                    content.innerHTML = `<video src="${file.driveLink}" controls autoplay class="max-w-full max-h-[75vh] rounded-2xl shadow-2xl bg-black"></video>`;
                } else {
                    const img = new Image();
                    img.src = file.url;
                    img.className = "max-w-full max-h-[80vh] rounded-2xl shadow-2xl border-4 border-white/10 animate-in";
                    img.onload = () => { content.innerHTML = ''; content.appendChild(img); };
                }
            };

            renderContent();
            
            // Set links
            downloadBtn.href = `https://drive.google.com/uc?export=download&id=${file.id}`;
            driveBtn.href = `https://drive.google.com/file/d/${file.id}/view`;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            
            // Update Navigation Buttons visibility
            updateNavButtons();
        }

        function navigateMedia(step) {
            if (currentIndex + step >= 0 && currentIndex + step < currentDisplayList.length) {
                currentIndex += step;
                openModal(currentDisplayList[currentIndex]);
            }
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').style.display = (currentIndex > 0) ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = (currentIndex < currentDisplayList.length - 1) ? 'block' : 'none';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = '';
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function resetSearch() { window.location.reload(); }
        
        function copyToClipboard(id) {
            const text = document.getElementById(id).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showMessageBox("คัดลอกค่า Wildcard แล้ว!");
        }

        function showMessageBox(msg) {
            const box = document.createElement('div');
            box.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-2xl shadow-2xl z-[200] animate-in text-sm font-medium';
            box.innerText = msg;
            document.body.appendChild(box);
            setTimeout(() => box.remove(), 4000);
        }
    </script>
</body>
</html>

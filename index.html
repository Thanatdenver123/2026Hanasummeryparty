<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Summer Party 2026 - Optimized Smart Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .image-card:hover { transform: translateY(-4px); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px); transition: 0.2s; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass shadow-sm px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                <div class="bg-blue-600 p-2.5 rounded-2xl text-white shadow-lg">
                    <i data-lucide="zap"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-none text-slate-900 uppercase">Hana Summer Party 2026</h1>
                </div>
            </div>

            <div id="searchActions" class="flex items-center gap-3 w-full md:w-auto">
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleVisualSearch(event)">
                <button onclick="document.getElementById('imageInput').click()" 
                        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full shadow-lg transition-all w-full justify-center active:scale-95">
                    <i data-lucide="camera" class="w-5 h-5"></i>
                    <span>ค้นหาจากรูปภาพ</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <!-- Error Guide -->
        <div id="setupGuide" class="hidden mb-10 p-8 bg-white border-2 border-red-100 rounded-[2.5rem] animate-in shadow-xl">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="bg-red-500 text-white p-6 rounded-3xl"><i data-lucide="shield-alert" class="w-12 h-12"></i></div>
                <div class="flex-1">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2 tracking-tight">API Restricted (403)</h2>
                    <p class="text-gray-600 mb-4">โปรดอนุญาตโดเมนในหน้า Console:</p>
                    <code class="bg-slate-900 p-4 rounded-2xl block text-blue-400 font-mono text-sm break-all">*.usercontent.goog/*</code>
                </div>
            </div>
        </div>

        <!-- Search Results Preview (Updated with Percentage) -->
        <div id="searchPreview" class="hidden mb-10 p-8 bg-white border border-blue-100 rounded-[3rem] shadow-xl animate-in text-center">
            <h3 class="text-blue-600 font-bold mb-6 flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                <i data-lucide="target" class="w-4 h-4"></i>
                <span>ผลการค้นหาอัจฉริยะ</span>
            </h3>
            <div class="relative inline-block">
                <img id="targetPreviewImg" class="h-44 w-44 object-cover rounded-3xl shadow-2xl border-4 border-white" src="" alt="Target">
                <button onclick="resetSearch()" class="absolute -top-3 -right-3 bg-red-500 text-white p-2 rounded-full hover:bg-red-600 shadow-lg transition-all active:scale-90">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="searchStatusContainer" class="mt-6">
                <!-- Percentage logic will update here -->
                <p id="searchStatus" class="text-xs text-blue-600 font-bold uppercase tracking-wider">AI กำลังเปรียบเทียบรูปภาพของคุณ... 0%</p>
                <div class="w-48 h-1 bg-slate-100 mx-auto mt-3 rounded-full overflow-hidden">
                    <div id="searchProgressBar" class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Main Loader -->
        <div id="mainLoader" class="flex flex-col items-center justify-center py-32">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-14 w-14 mb-6"></div>
            <p class="text-slate-400 text-sm font-medium animate-pulse uppercase tracking-widest">ดึงข้อมูลรูปถ่ายจากคลังสื่อ...</p>
        </div>

        <!-- Gallery Container -->
        <div id="galleryContainer" class="space-y-12 pb-24"></div>

    </main>

    <!-- Modal View -->
    <div id="imageModal" class="fixed inset-0 bg-slate-900/98 backdrop-blur-2xl z-[100] hidden items-center justify-center p-4 select-none">
        
        <button onclick="closeModal()" class="absolute top-4 right-4 md:top-8 md:right-8 bg-black/50 hover:bg-white/10 text-white p-5 rounded-full z-[120] transition-all active:scale-90 shadow-2xl">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>

        <button id="prevBtn" onclick="navigateMedia(-1)" class="nav-btn absolute left-8 top-1/2 -translate-y-1/2 text-white p-5 rounded-full z-[105] hidden lg:block active:scale-95">
            <i data-lucide="chevron-left" class="w-10 h-10"></i>
        </button>
        <button id="nextBtn" onclick="navigateMedia(1)" class="nav-btn absolute right-8 top-1/2 -translate-y-1/2 text-white p-5 rounded-full z-[105] hidden lg:block active:scale-95">
            <i data-lucide="chevron-right" class="w-10 h-10"></i>
        </button>

        <div class="max-w-6xl w-full flex flex-col items-center gap-6 animate-in">
            <div id="modalContent" class="w-full flex justify-center items-center min-h-[40vh] md:min-h-[60vh]"></div>
            
            <div class="flex lg:hidden gap-12 mt-2">
                 <button onclick="navigateMedia(-1)" class="bg-white/10 p-5 rounded-full text-white active:bg-blue-600 transition-colors shadow-lg">
                    <i data-lucide="chevron-left" class="w-8 h-8"></i>
                </button>
                 <button onclick="navigateMedia(1)" class="bg-white/10 p-5 rounded-full text-white active:bg-blue-600 transition-colors shadow-lg">
                    <i data-lucide="chevron-right" class="w-8 h-8"></i>
                </button>
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-4 w-full px-6">
                <a id="downloadBtn" href="#" download class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl font-bold active:scale-95 transition-all text-lg">
                    <i data-lucide="download" class="w-6 h-6"></i>
                    <span>ดาวน์โหลดรูปนี้</span>
                </a>
                <a id="driveBtn" href="#" target="_blank" class="bg-white/10 hover:bg-white/20 text-white px-10 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all border border-white/5 active:scale-95">
                    <i data-lucide="external-link" class="w-5 h-5"></i>
                    <span>ดูต้นฉบับบน Drive</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBnIUmU5oRM75p8OETC9fINXWJ3_TeFVFc';
        const ROOT_FOLDER = '1Et52WiWBv7xVkWu7fWwb6P6BMjxFk-B4';
        
        let net = null; 
        let allMedia = []; 
        let currentDisplayList = []; 
        let currentIndex = -1;
        let mediaEmbeddings = new Map(); 
        let isIndexing = false;
        let indexingProgress = 0;

        lucide.createIcons();

        window.onload = async () => {
            try {
                const modelTask = mobilenet.load();
                await fetchRecursive(ROOT_FOLDER, "Root");
                
                net = await modelTask;
                document.getElementById('mainLoader').classList.add('hidden');
                
                if (allMedia.length > 0) {
                    startBackgroundIndexing();
                } else {
                    document.getElementById('galleryContainer').innerHTML = `<div class="text-center py-20 text-slate-400">ไม่พบรูปภาพในคลัง</div>`;
                }
            } catch (error) {
                if (error.message.includes("403")) document.getElementById('setupGuide').classList.remove('hidden');
                else console.error(error);
            }
        };

        async function fetchRecursive(folderId, folderName) {
            try {
                // Focus only on images for maximum speed
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,webContentLink,thumbnailLink)&pageSize=1000&key=${API_KEY}`);
                const data = await res.json();
                const items = data.files || [];

                const subFolders = items.filter(i => i.mimeType === 'application/vnd.google-apps.folder');
                const imageFiles = items.filter(i => i.mimeType.includes('image/'));

                if (imageFiles.length > 0) {
                    let cleanTitle = folderName.replace(/^Root\s*\/?\s*/, "") || "คลังรูปภาพรวม";
                    const mapped = imageFiles.map(f => ({
                        id: f.id,
                        name: f.name,
                        mimeType: f.mimeType,
                        driveLink: f.webContentLink,
                        url: `https://lh3.googleusercontent.com/d/${f.id}=w1600`,
                        thumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s400') : `https://lh3.googleusercontent.com/d/${f.id}=w400`,
                        folderName: cleanTitle
                    }));
                    allMedia.push(...mapped);
                    if (currentDisplayList.length === 0) currentDisplayList = allMedia;
                    renderFolderSection(cleanTitle, mapped);
                }

                await Promise.all(subFolders.map(sub => fetchRecursive(sub.id, `${folderName} / ${sub.name}`)));
            } catch (e) { console.warn("Fetch Error:", e); }
        }

        async function startBackgroundIndexing() {
            if (isIndexing || !net) return;
            isIndexing = true;
            
            const total = allMedia.length;
            let count = 0;

            for (let item of allMedia) {
                try {
                    if (!mediaEmbeddings.has(item.id)) {
                        const vector = await getImageEmbedding(item.thumb);
                        mediaEmbeddings.set(item.id, vector);
                    }
                } catch (e) {}
                count++;
                indexingProgress = Math.round((count / total) * 100);
                
                // Update UI if user is currently searching
                const statusEl = document.getElementById('searchStatus');
                const barEl = document.getElementById('searchProgressBar');
                if (statusEl && barEl && !document.getElementById('searchPreview').classList.contains('hidden')) {
                     statusEl.innerText = `กำลังประมวลผลฐานข้อมูลภาพ: ${indexingProgress}%`;
                     barEl.style.width = indexingProgress + '%';
                }

                if (count % 5 === 0) await new Promise(r => setTimeout(r, 1));
            }
            isIndexing = false;
        }

        async function handleVisualSearch(event) {
            const file = event.target.files[0];
            if (!file || !net) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const previewImg = document.getElementById('targetPreviewImg');
                previewImg.src = e.target.result;
                document.getElementById('searchPreview').classList.remove('hidden');
                document.getElementById('galleryContainer').classList.add('opacity-30');
                window.scrollTo({ top: 0, behavior: 'smooth' });

                const startTime = performance.now();

                setTimeout(async () => {
                    const targetActivation = await net.infer(previewImg, true);
                    const targetVector = await targetActivation.data();

                    const results = [];
                    const total = allMedia.length;
                    
                    for (let i = 0; i < total; i++) {
                        let item = allMedia[i];
                        let featureVector = mediaEmbeddings.get(item.id);
                        
                        // Fallback if indexing is still catching up
                        if (!featureVector) {
                            try {
                                featureVector = await getImageEmbedding(item.thumb);
                                mediaEmbeddings.set(item.id, featureVector);
                            } catch (e) { continue; }
                        }
                        
                        results.push({ ...item, score: cosineSimilarity(targetVector, featureVector) });
                        
                        // Update Search Percentage UI
                        if (i % 20 === 0) {
                            const p = Math.round((i / total) * 100);
                            document.getElementById('searchStatus').innerText = `AI กำลังเปรียบเทียบรูปภาพของคุณ... ${p}%`;
                            document.getElementById('searchProgressBar').style.width = p + '%';
                        }
                    }

                    results.sort((a, b) => b.score - a.score);
                    
                    // LIMIT TO TOP 50 as requested
                    const top50 = results.slice(0, 50);
                    
                    const endTime = performance.now();
                    const duration = ((endTime - startTime) / 1000).toFixed(2);
                    
                    currentDisplayList = top50; 
                    displaySearchResults(top50, duration);
                }, 50);
            };
            reader.readAsDataURL(file);
        }

        function displaySearchResults(results, time) {
            const container = document.getElementById('galleryContainer');
            container.classList.remove('opacity-30');
            container.innerHTML = `
                <div class="animate-in px-2">
                    <div class="flex items-center gap-4 mb-8">
                        <h2 class="text-xl font-bold text-blue-600 uppercase italic">🎯 ผลการค้นหาที่ดีที่สุด (50 อันดับแรก)</h2>
                        <div class="h-1 bg-blue-100 flex-1 rounded-full"></div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                        ${results.map((f, idx) => `
                            <div class="image-card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer relative border-4 border-white flex flex-col" onclick='openSearchModal(${idx})'>
                                <div class="aspect-square relative overflow-hidden bg-slate-100">
                                    <img src="${f.thumb}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-3 text-center bg-white border-t border-slate-50">
                                    <div class="text-blue-600 font-bold text-sm">${Math.round(f.score * 100)}% Match</div>
                                    <div class="text-[9px] text-slate-400 font-medium uppercase mt-1">Processed in ${time}s</div>
                                    <div class="text-[9px] text-slate-300 truncate mt-1">${f.folderName}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('searchStatus').innerText = "ค้นพบ " + results.length + " รูปที่ตรงกับคุณที่สุด";
            document.getElementById('searchProgressBar').style.width = '100%';
        }

        function renderFolderSection(title, files) {
            const container = document.getElementById('galleryContainer');
            const section = document.createElement('section');
            section.className = 'animate-in mb-8';
            section.innerHTML = `
                <div class="flex items-center gap-4 mb-5 px-2">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="folder" class="w-3 h-3"></i> ${title}
                    </h2>
                    <div class="h-px bg-slate-200 flex-1"></div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 px-2"></div>
            `;
            const grid = section.querySelector('.grid');
            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'image-card bg-white rounded-2xl shadow-sm overflow-hidden cursor-pointer border-2 border-white hover:shadow-xl transition-all relative';
                div.onclick = () => {
                    currentIndex = currentDisplayList.findIndex(m => m.id === file.id);
                    openModal(file);
                };
                div.innerHTML = `
                    <div class="aspect-square bg-slate-50 relative">
                        <img src="${file.thumb}" class="w-full h-full object-cover opacity-0 transition-opacity" onload="this.style.opacity='1'" crossorigin="anonymous" loading="lazy">
                    </div>
                `;
                grid.appendChild(div);
            });
            container.appendChild(section);
            lucide.createIcons();
        }

        function openSearchModal(index) { currentIndex = index; openModal(currentDisplayList[currentIndex]); }

        async function getImageEmbedding(url) {
            return new Promise((resolve, reject) => {
                const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
                img.onload = async () => {
                    try { const activation = await net.infer(img, true); resolve(await activation.data()); } catch (e) { reject(e); }
                };
                img.onerror = reject;
            });
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, mA = 0, mB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += (vecA[i] * vecB[i]);
                mA += (vecA[i] * vecA[i]);
                mB += (vecB[i] * vecB[i]);
            }
            return dotProduct / (Math.sqrt(mA) * Math.sqrt(mB));
        }

        function openModal(file) {
            const modal = document.getElementById('imageModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = '<div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>';
            const img = new Image();
            img.src = file.url;
            img.className = "max-w-full max-h-[65vh] md:max-h-[80vh] rounded-3xl shadow-2xl animate-in object-contain";
            img.onload = () => { content.innerHTML = ''; content.appendChild(img); };
            document.getElementById('downloadBtn').href = `https://drive.google.com/uc?export=download&id=${file.id}`;
            document.getElementById('driveBtn').href = `https://drive.google.com/file/d/${file.id}/view`;
            modal.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
            updateNavButtons();
        }

        function navigateMedia(step) {
            if (currentIndex + step >= 0 && currentIndex + step < currentDisplayList.length) {
                currentIndex += step;
                openModal(currentDisplayList[currentIndex]);
            }
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').style.opacity = (currentIndex > 0) ? '1' : '0.2';
            document.getElementById('nextBtn').style.opacity = (currentIndex < currentDisplayList.length - 1) ? '1' : '0.2';
        }

        function closeModal() { document.getElementById('imageModal').classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }
        function resetSearch() { window.location.reload(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hana Summer Party 2026</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f1f5f9; font-family:sans-serif; }
.card:hover { transform:scale(1.05); transition:.2s; }
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6">🎉 Hana Summer Party 2026</h1>

<div id="status" class="text-red-500 mb-4"></div>
<div id="content" class="space-y-8"></div>

</div>

<script>

const API_KEY = "AIzaSyBnIUmU5oRM75p8OETC9fINXWJ3_TeFVFc";
const ROOT_FOLDER = "1Et52WiWBv7xVkWu7fWwb6P6BMjxFk-B4";

// 🔥 รูปเร็ว
function imgUrl(id){
  return `https://lh3.googleusercontent.com/d/${id}=w400`;
}

// 📁 ดึง folder
async function getFolders(){
  try{
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${ROOT_FOLDER}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType)`
    );

    const data = await res.json();

    if(!data.files){
      throw new Error("โหลด folder ไม่ได้");
    }

    return data.files.filter(f=>f.mimeType==="application/vnd.google-apps.folder");

  }catch(e){
    document.getElementById("status").innerText = "❌ ERROR: " + e.message;
    return [];
  }
}

// 📷 ดึงรูป
async function getImages(folderId){
  try{
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType)`
    );

    const data = await res.json();

    if(!data.files) return [];

    return data.files
      .filter(f=>f.mimeType.includes("image"))
      .map(f=>({
        id:f.id,
        url:imgUrl(f.id)
      }));

  }catch(e){
    return [];
  }
}

// 🚀 โหลดทั้งหมด
async function loadAll(){

  const content = document.getElementById("content");
  content.innerHTML = "⏳ กำลังโหลด...";

  const folders = await getFolders();

  if(folders.length === 0){
    content.innerHTML = "❌ ไม่พบ folder (เช็ค Drive public)";
    return;
  }

  content.innerHTML = "";

  for(const folder of folders){

    const images = await getImages(folder.id);

    const section = document.createElement("div");

    section.innerHTML = `
      <div class="bg-white rounded-xl shadow p-4">
        <h2 class="text-lg font-semibold mb-3">📁 ${folder.name}</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
      </div>
    `;

    const grid = section.querySelector(".grid");

    if(images.length === 0){
      grid.innerHTML = "<p class='text-gray-400'>ไม่มีรูป</p>";
    }

    images.forEach(img=>{
      const el = document.createElement("img");
      el.src = img.url;
      el.className = "w-full h-32 object-cover rounded card";
      el.loading = "lazy";
      grid.appendChild(el);
    });

    content.appendChild(section);
  }
}

// start
loadAll();

</script>

</body>
</html>
